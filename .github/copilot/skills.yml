# GitHub Copilot Skills for Blockbit

skills:
  - id: blockbit-build
    name: Build Blockbit
    description: Build the Blockbit game using CMake and Ninja
    working_directory: /home/talarek/Desktop/Blockbit
    commands:
      - name: debug
        description: Debug build
        command: ./build.sh
      - name: release
        description: Release build (optimized)
        command: ./build.sh release
      - name: rebuild
        description: Clean and rebuild with all CPU cores
        command: ./build.sh rebuild -j$(nproc)

  - id: blockbit-test-world
    name: Test Blockbit World
    description: Build and test Blockbit with specific world
    working_directory: /home/talarek/Desktop/Blockbit
    commands:
      - name: test-swiat
        description: Build and load Swiat world
        command: ./build.sh run-world Swiat
      - name: run-world
        description: Run built binary with world
        command: ./build/bin/Blockbit --load Swiat
