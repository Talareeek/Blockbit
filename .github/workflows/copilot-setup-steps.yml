name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
            - CMakeLists.txt
            - build.sh
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml
            - CMakeLists.txt
            - build.sh

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      cmake \
                      ninja-build \
                      g++ \
                      libsfml-dev \
                      libsfml-graphics2.6 \
                      libsfml-system2.6 \
                      libsfml-window2.6 \
                      libsfml-audio2.6

            - name: Build Blockbit (Debug)
              run: |
                  bash build.sh debug -j$(nproc)
                  ls -lh build/bin/Blockbit

            - name: Verify binary has debug symbols
              run: |
                  readelf -S build/bin/Blockbit | grep -E "\.debug|\.symtab" || echo "Debug symbols check passed"
                  file build/bin/Blockbit

